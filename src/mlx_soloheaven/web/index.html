<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
    <title>SoloHeaven</title>
    <link rel="stylesheet" href="style.css?v=9">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
</head>
<body>
    <div id="app">
        <aside id="sidebar">
            <div class="sidebar-top">
                <div class="logo">SoloHeaven</div>
                <button id="new-chat-btn" title="New Chat">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
                </button>
            </div>
            <div class="sidebar-search">
                <input type="text" id="search-input" placeholder="Search chats...">
            </div>
            <div id="session-list"></div>
            <div class="sidebar-bottom">
                <div class="model-selector">
                    <span class="model-dot"></span>
                    <select id="model-select"></select>
                </div>
                <div id="cache-stats-text"></div>
            </div>
        </aside>
        <div id="sidebar-backdrop"></div>

        <main id="main">
            <header id="header">
                <button id="sidebar-toggle" class="icon-btn hamburger-btn" title="Menu">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
                </button>
                <div id="header-title">New Chat</div>
                <div id="header-actions"><button id="settings-toggle" class="icon-btn" title="Settings">⚙️</button>
                    <button id="delete-chat-btn" class="icon-btn" title="Delete Chat">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
                    </button>
                </div>
            </header>

            <div id="messages"></div>

            <div id="input-container">
                <div id="input-wrapper">
                    <textarea id="input" placeholder="Send a message..." rows="1"></textarea>
                    <button id="send-btn" title="Send (Enter)">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                    </button>
                </div>
                <div id="input-hint">Enter to send, Shift+Enter for new line</div>
            </div>
        </main>

        <aside id="settings-sidebar">
            <div class="sidebar-top">
                <div class="logo">Settings</div>
                <button id="close-settings" class="icon-btn">✕</button>
            </div>
            <div class="settings-content">
                <div class="setting-item">
                    <label>System Prompt</label>
                    <textarea id="system-prompt-editor" rows="4" placeholder="Enter system prompt..."></textarea>
                </div>
                <div class="setting-item">
                    <label>Temperature (<span id="temp-val">0.6</span>)</label>
                    <input type="range" id="temp-range" min="0" max="2" step="0.1" value="0.6">
                </div>
                <div class="setting-item">
                    <label>Thinking Budget</label>
                    <input type="number" id="thinking-budget" value="8192">
                </div>
                <div class="setting-item">
                    <label>Max Tokens</label>
                    <input type="number" id="max-tokens" value="32768">
                </div>
                <div class="setting-item">
                    <label>Context Limit</label>
                    <select id="context-limit">
                        <option value="30000">30,000</option>
                        <option value="50000">50,000</option>
                        <option value="100000" selected>100,000</option>
                        <option value="200000">200,000</option>
                    </select>
                </div>
                <button id="save-settings-btn" class="primary-btn">Save Changes</button>

                <div class="settings-divider"></div>
                <div class="setting-item">
                    <label>Context Compaction</label>
                    <div id="compaction-status" class="compaction-status"></div>
                    <div class="setting-item">
                        <label>Keep Recent Turns</label>
                        <input type="number" id="compact-keep-recent" value="3" min="1" max="20">
                    </div>
                    <details class="compact-prompt-details">
                        <summary>Compaction Prompt</summary>
                        <textarea id="compact-prompt" rows="10"></textarea>
                    </details>
                    <button id="compact-btn" class="compact-btn" disabled>Compact Now</button>
                </div>
            </div>
        </aside>

    </div>
    <script src="app.js?v=13"></script>
</body>
</html>
